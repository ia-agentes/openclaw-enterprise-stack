global:
  checkNewVersion: false
  sendAnonymousUsage: false

api:
  dashboard: true

log:
  level: INFO

accessLog:
  filePath: /logs/access.log

entryPoints:

  web:
    address: ":80"

  websecure:
    address: ":443"

providers:

  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: oces_proxy

  file:
    directory: /etc/traefik/dynamic
    watch: true

certificatesResolvers:

  letsencrypt:

    acme:

      email: admin@colegiosantoanjo.tech

      storage: /letsencrypt/acme.json

      httpChallenge:

        entryPoint: web